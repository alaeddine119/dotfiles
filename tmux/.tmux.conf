# =============================================
# 1. CORE SETTINGS
# =============================================
set-option -g default-shell /bin/zsh # use zsh
set -g status-interval 1     # Faster refresh for AI icon/Git status
set -g status-position bottom # Ensure it stays at the bottom
set -g status-bg default      # Ensure background is transparent
set -g set-clipboard on

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on
# Fix colors and enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Ensure window index numbers get reordered on delete
set-option -g renumber-windows on

# Required for vim-tpipeline plugin
set -g focus-events on
set -g status-style bg=default
set -g status-left-length 90
set -g status-right-length 90
set -g status-justify centre

# Enable Vi-style keys in copy-mode and system menus (like 'choose-tree')
set -g mode-keys vi

# Use 'v' to trigger selection, and 'y' to yank (copy)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Keep selection active after mouse drag (don't jump to bottom)
unbind -T copy-mode-vi MouseDragEnd1Pane

# If I kill a session, jump to the next one.
# Only exit tmux if there are NO sessions left.
set-option -g detach-on-destroy off

# =============================================
# 2. KEY BINDINGS
# =============================================

# Change Prefix from Ctrl+b to Ctrl+a (Easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config quickly with <prefix> r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Kill pane WITHOUT confirmation (The fix you asked for)
bind x kill-pane

# Better Split commands (Open in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# Resize panes with Prefix + Arrow Keys
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r Left resize-pane -L 5

# Select panes with Prefix + h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move (swap) panes with Alt + h, j, k, l (No prefix needed)
bind -n M-h swap-pane -d -t '{left-of}'
bind -n M-j swap-pane -d -t '{down-of}'
bind -n M-k swap-pane -d -t '{up-of}'
bind -n M-l swap-pane -d -t '{right-of}'


# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# Toggle zoom of current pane (maximize/minimize)
bind -r m resize-pane -Z

# Fix C-l (Clear Screen) conflict with Netrw/Vim
bind C-l send-keys 'C-l'

# Create a new session
bind N new-session

# =============================================
# 3. VIM INTEGRATION (Navigator)
# =============================================
# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
# Replace your current C-j line with this:
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'send-keys C-j; select-pane -D'

# Use Ctrl-\ to switch to the previous pane/split
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\'  'select-pane -l'

# Enable Copy Mode navigation matching Vim
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# =============================================
# 3. PLUGINS SETUP
# =============================================
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'

# -- Plugin Settings --

# Restore Vim sessions
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Restore pane contents (the text on screen)
set -g @resurrect-capture-pane-contents 'on'

# Auto-restore on tmux start (via Continuum)
set -g @continuum-restore 'off'

# Theme
set -g @rose_pine_variant 'moon'
set -g @rose_pine_directory 'on'

# Explicitly disable user and host
set -g @rose_pine_user 'off'
set -g @rose_pine_host 'off'

# Keep your transparent background!
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Separators
set -g @rose_pine_window_status_separator "  "

# Example values for these can be:
set -g @rose_pine_left_separator ' > ' # The strings to use as separators are 1-space padded
set -g @rose_pine_right_separator ' < ' # Accepts both normal chars & nerdfont icons
set -g @rose_pine_field_separator '  ' # Default is two-space-padded, but can be set to anything
set -g @rose_pine_window_separator ' - ' # Replaces the default `:` between the window number and name

# These are not padded
set -g @rose_pine_session_icon '' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon '' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon '' # Changes the default icon to the left of the current directory folder
set -g @rose_pine_username_icon '' # Changes the default icon to the right of the hostname
set -g @rose_pine_hostname_icon '󰒋' # Changes the default icon to the right of the hostname
set -g @rose_pine_date_time_icon '󰃰' # Changes the default icon to the right of the date module



# -- Initialize TMUX plugin manager --
# (Keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
