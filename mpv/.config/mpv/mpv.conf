# ==============================================================================
# 1. uosc & Core UI Integration
# ==============================================================================
# Disable the native, legacy OSD bar (uosc flashes its own cleaner visual indicators)
osd-bar=no

# Hide native window titlebars and borders (Allows Sway to handle clean geometry layout)
border=no

# Keep the player window open after video playback ends (Crucial for browsing uosc menus)
keep-open=yes

# Match uosc's interface typography to your system terminal layout
osd-font="JetBrains Mono"
osd-font-size=32

# ==============================================================================
# 2. Wayland & Hardware Video Output Performance
# ==============================================================================
# Use the high-performance rendering backend (Highly optimized for Wayland shaders)
vo=gpu-next
gpu-context=wayland

# High-quality scaling filters (The integrated Apple GPU handles these effortlessly)
scale=spline36
cscale=spline36
dscale=mitchell

# ==============================================================================
# 3. Track Selection & Subtitle Automation
# ==============================================================================
# Automatically look for and load any local subtitle files containing the video name
sub-auto=all

# Force the demuxer to parse ahead in MKV containers to prevent subtitle clips when scrubbing
demuxer-mkv-subtitle-preroll=yes

# Default language track priority mapping (Audio and Subtitles)
alang=eng,ara,fra,ita
slang=eng,ara,fra,ita

# ==============================================================================
# 4. Screenshots & Cache Configurations
# ==============================================================================
# Map screenshots cleanly into your standard storage directories
screenshot-format=png
screenshot-directory="~/Pictures/Screenshots"
screenshot-template="mpv_%F_%p"

# Large background network cache allocation for streaming URLs
cache=yes


script-opts=ytsub-source_lang=en,ytsub-filter_sub_single_line=yes
