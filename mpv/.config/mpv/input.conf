# ==========================================
# YouTube Keybindings for mpv
# ==========================================

# Play/Pause
k cycle pause
SPACE cycle pause

# Seeking (J/L and Left/Right Arrows)
l seek 10
j seek -10
RIGHT seek 5
LEFT seek -5

# Volume (Up/Down Arrows)
UP add volume 5
DOWN add volume -5

# Playback Speed (Shift + > and Shift + <)
> add speed 0.25
< add speed -0.25

# Toggle Captions/Subtitles
c cycle sub-visibility

# Fullscreen & Mute
f cycle fullscreen
m cycle mute

# Absolute Percentage Seeking (0-9)
0 seek 0 absolute-percent
1 seek 10 absolute-percent
2 seek 20 absolute-percent
3 seek 30 absolute-percent
4 seek 40 absolute-percent
5 seek 50 absolute-percent
6 seek 60 absolute-percent
7 seek 70 absolute-percent
8 seek 80 absolute-percent
9 seek 90 absolute-percent

# ==============================================================================
# File Management, Clipboard & Streaming (uosc Integrations)
# ==============================================================================

# Open searchable file browser explorer
o script-binding uosc/open-file

# Paste URL or path from clipboard (Opens immediately or appends to running playlist)
Ctrl+v script-binding uosc/paste

# Open unified items/playlist navigation menu
p script-binding uosc/items

# Dynamic stream quality format selector (Great for YouTube streams)
q script-binding uosc/stream-quality

# Audio track and subtitle selector menus
a script-binding uosc/audio
s script-binding uosc/subtitles

# Toggle the minimalist master context menu (Keyboard or Right Click)
menu       script-binding uosc/menu
mbtn_right script-binding uosc/menu

# Quit application (Muscle memory safety lock)
q quit

# Stream Quality format selector menu (Shift + Q)
Q script-binding uosc/stream-quality


# Increase subtitle scale with Ctrl + Plus (=)
Ctrl+= add sub-scale +0.1

# Decrease subtitle scale with Ctrl + Minus (-)
Ctrl+- add sub-scale -0.1

# Reset subtitle scale to default (1.0) using Ctrl+0
Ctrl+0 set sub-scale 1.0
