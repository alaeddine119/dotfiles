### Keybindings

# Core Executions
bindsym $mod+Return exec $term
bindsym $mod+Space exec $menu
bindsym $mod+q kill
bindsym $mod+b exec $browser
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag -t warning -m 'Exit Sway?' -B 'Yes' 'swaymsg exit'

# Floating Modes
bindsym $mod+Shift+space floating toggle
bindsym $mod+Shift+v focus mode_toggle
floating_modifier $mod normal

# Status Bar Toggle Control
bindsym $mod+Shift+b bar bar-0 mode toggle

# Moving Focus
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Moving Windows
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Workspaces
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

bindsym $mod+Shift+1 move container to workspace number 1; workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2; workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3; workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4; workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5; workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6; workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7; workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8; workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9; workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10; workspace number 10

# Layout Manipulation
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split
bindsym $mod+f fullscreen
bindsym $mod+a focus parent

# Resize Mode
mode "resize" {
    bindsym $left resize shrink width 10px
    bindsym $down resize grow height 10px
    bindsym $up resize shrink height 10px
    bindsym $right resize grow width 10px
    bindsym Left resize shrink width 10px
    bindsym Down resize grow height 10px
    bindsym Up resize shrink height 10px
    bindsym Right resize grow width 10px
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

# Hardware Controls (Asahi/Mac)
# Volume
bindsym --locked XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym --locked XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym --locked XF86AudioRaiseVolume exec wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindsym --locked XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media Playback Controls
bindsym --locked XF86AudioPlay exec playerctl play-pause
bindsym --locked XF86AudioNext exec playerctl next
bindsym --locked XF86AudioPrev exec playerctl previous

# Brightness
bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+
bindsym --locked XF86KbdBrightnessDown exec brightnessctl --device='*kbd_backlight' set 5%-
bindsym --locked XF86KbdBrightnessUp exec brightnessctl --device='*kbd_backlight' set 5%+

# Screenshot
bindsym $mod+p exec bash -c 'grim ~/Pictures/Screenshots/$(date +"%Y-%m-%d_%H-%M-%S").png'
bindsym $mod+shift+p exec bash -c 'grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +"%Y-%m-%d_%H-%M-%S").png'

# Color picker
bindsym $mod+c exec grim -g "$(slurp -p)" -t ppm - | convert - -format '%[pixel:p{0,0}]' txt:- | tail -n 1 | cut -d ' ' -f 4 | wl-copy

# Power Menu
bindsym $mod+Shift+q exec ~/.local/bin/power-menu.sh

# Notification Management (Mako)
bindsym $mod+n exec makoctl dismiss           # Dismiss the top notification
bindsym $mod+Shift+n exec makoctl dismiss -a  # Dismiss ALL notifications at once
bindsym $mod+Ctrl+n exec makoctl restore      # Bring back the last dismissed notification

# Bounce between your two most recent windows
bindsym $mod+Tab exec swayr switch-to-urgent-or-lru-window

# Or use Rofi to search all open windows across all workspaces!
bindsym $mod+Shift+Tab exec swayr switch-window


# Clipboard (Rofi Integration)
# Mod+v -> Open Clipboard History using Rofi in dmenu mode
bindsym $mod+v exec bash -c 'cliphist list | rofi -dmenu -p "Clipboard" -theme-str "window {width: 50%;}" | cliphist decode | wl-copy'

# TUI Apps & Scripts
bindsym $mod+Alt+b exec foot --title "Bluetooth TUI" bluetui
bindsym $mod+Alt+w exec foot --title "Wifi TUI" impala
bindsym $mod+Shift+BackSpace exec foot --title "Task Manager" btop
bindsym $mod+Alt+s exec foot --title "Sound TUI" wiremix --max-volume-percent 100

# Lock Screen
bindsym $mod+Alt+l exec swaylock -f --screenshots --clock --indicator --effect-scale 0.5 --effect-blur 7x5 --effect-scale 2


