# =====================================================================
# 1. FONTS
# =====================================================================
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0
modify_font      cell_height 125%

# Un-breaks programming ligatures when your cursor is over them
disable_ligatures cursor

symbol_map U+0600-U+06FF,U+0750-U+077F,U+0870-U+089F,U+08A0-U+08FF,U+FB50-U+FDFF,U+FE70-U+FEFF,U+10E60-U+10E7F,U+10EC0-U+10EFF,U+1EC70-U+1ECBF,U+1ED00-U+1ED4F,U+1EE00-U+1EEFF KawkabMono-Regular
force_ltr yes
# =====================================================================
# 2. PERFORMANCE & WAYLAND
# =====================================================================
# Force native Wayland support
linux_display_server wayland

# 60 FPS rendering (matches 60Hz display)
repaint_delay 16
input_delay 3
sync_to_monitor yes

# Disable Wayland IME to remove input lag
wayland_enable_ime no

# =====================================================================
# 3. WINDOW & UI
# =====================================================================
hide_window_decorations yes
confirm_os_window_close 0

# =====================================================================
# 4. BEHAVIOR
# =====================================================================
shell tmux new-session -A -s main

# =====================================================================
# 5. COLORS (Rosé Pine Moon + Black Background)
# =====================================================================
background_opacity 1.0
foreground #E0E0E0
background #000000

color0  #393552
color1  #eb6f92
color2  #3e8fb0
color3  #f6c177
color4  #9ccfd8
color5  #c4a7e7
color6  #ea9a97
color7  #e0def4
color8  #6e6a86
color9  #eb6f92
color10 #3e8fb0
color11 #f6c177
color12 #9ccfd8
color13 #c4a7e7
color14 #ea9a97
color15 #e0def4
